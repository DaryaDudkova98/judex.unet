name: Deploy to Beget

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync with password
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'var/' \
            --exclude 'vendor/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'tests/' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Run Symfony commands
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}
            echo "=== Current directory ==="
            pwd
            echo "=== Files ==="
            ls -la
            echo "=== Setting permissions ==="
            chmod -R 775 var/cache var/log 2>/dev/null || true
            echo "=== Composer ==="
            composer install --no-dev --optimize-autoloader --no-interaction 2>/dev/null || echo "Composer skipped"
            echo "=== Cache ==="
            php bin/console cache:clear --env=prod
            php bin/console cache:warmup --env=prod
            echo "=== Done! ==="
          EOF